<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consistency Tracker - Task Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1baf7a;
      --primary-light: #2dd4a4;
      --secondary: #2a78d6;
      --secondary-light: #3987e5;
      --danger: #e34948;
      --surface-0: #0f0f0f;
      --surface-1: #1a1a1a;
      --surface-2: #252525;
      --surface-3: #333333;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #707070;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.15);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --surface-0: #ffffff;
        --surface-1: #f8f8f8;
        --surface-2: #f0f0f0;
        --surface-3: #e8e8e8;
        --text-primary: #0f0f0f;
        --text-secondary: #505050;
        --text-muted: #909090;
        --border: rgba(0, 0, 0, 0.06);
        --border-strong: rgba(0, 0, 0, 0.12);
      }
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--surface-0);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    body {
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      height: 100vh;
      gap: 0;
    }

    @media (max-width: 1200px) {
      .container {
        grid-template-columns: 1fr;
        height: auto;
      }
    }

    /* LEFT PANEL - TASK DASHBOARD */
    .task-dashboard {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      order: -1;
    }

    @media (max-width: 1200px) {
      .task-dashboard {
        height: auto;
        min-height: 100vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
        order: 0;
      }
    }

    .dashboard-header {
      margin-bottom: 2rem;
    }

    .dashboard-date {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .dashboard-date-info {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      background: var(--surface-2);
      padding: 1.25rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .stat-card:hover {
      border-color: var(--border-strong);
      background: var(--surface-3);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-value.secondary {
      color: var(--secondary);
    }

    .task-section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 2px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-primary);
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--secondary);
      background: var(--surface-3);
      box-shadow: 0 0 0 3px rgba(42, 120, 214, 0.1);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    button {
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--secondary), var(--secondary-light));
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(42, 120, 214, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .task-item:hover {
      background: var(--surface-3);
      border-color: var(--border-strong);
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .task-label {
      flex: 1;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
      word-break: break-word;
    }

    .task-item.completed .task-label {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .delete-btn {
      background: transparent;
      color: var(--text-muted);
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.2s;
      border-radius: 6px;
    }

    .delete-btn:hover {
      background: rgba(227, 73, 72, 0.1);
      color: var(--danger);
    }

    .chart-container {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      height: 300px;
      position: relative;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* RIGHT SIDEBAR - CALENDAR */
    .calendar-panel {
      background: var(--surface-1);
      padding: 2rem;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      order: 1;
      position: relative;
      user-select: none;
    }

    @media (max-width: 1200px) {
      .calendar-panel {
        height: auto;
        border-left: none;
        border-top: 1px solid var(--border);
        order: 0;
      }
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 10;
      min-height: 32px;
    }

    .month-year {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: 150px;
      text-align: center;
      transition: opacity 0.3s ease;
    }

    .calendar-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: flex-start;
      cursor: grab;
    }

    .calendar-wrapper:active {
      cursor: grabbing;
    }

    .calendar-content {
      width: 100%;
      display: flex;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .calendar-content.dragging {
      transition: none;
    }

    .calendar-month {
      width: 100%;
      min-width: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      flex: 1;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      gap: 2px;
    }

    .calendar-day:hover {
      border-color: var(--primary);
      background: var(--surface-3);
      transform: translateY(-2px);
    }

    .calendar-day.other-month {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .calendar-day.other-month:hover {
      transform: none;
      border-color: var(--border);
      background: var(--surface-2);
    }

    .calendar-day.selected {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-color: var(--primary);
      color: white;
      box-shadow: 0 8px 24px rgba(27, 175, 122, 0.3);
    }

    .day-number {
      font-weight: 700;
      font-size: 12px;
      color: var(--text-primary);
      z-index: 2;
    }

    .calendar-day.selected .day-number {
      color: white;
    }

    .progress-ring-small {
      width: 28px;
      height: 28px;
      position: relative;
    }

    .progress-ring-small svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-circle-bg {
      fill: none;
      stroke: var(--surface-3);
      stroke-width: 2;
    }

    .progress-circle-fill {
      fill: none;
      stroke: var(--primary);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease;
    }

    .calendar-day.selected .progress-circle-fill {
      stroke: white;
    }

    .progress-percent {
      font-size: 8px;
      font-weight: 700;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-muted);
      z-index: 1;
    }

    .calendar-day.selected .progress-percent {
      color: rgba(255, 255, 255, 0.8);
    }

    .swipe-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1rem;
      opacity: 0.4;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    @media (max-width: 1200px) {
      .container {
        grid-template-columns: 1fr;
      }

      .calendar-panel {
        height: auto;
      }

      .task-dashboard {
        height: auto;
      }
    }

    @media (max-width: 768px) {
      .calendar-panel {
        padding: 1.5rem;
      }

      .task-dashboard {
        padding: 1.5rem;
      }

      .dashboard-date {
        font-size: 24px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .calendar-grid {
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LEFT PANEL - TASK DASHBOARD -->
    <div class="task-dashboard">
      <div class="dashboard-header">
        <div class="dashboard-date" id="dashboardDate">Today</div>
        <div class="dashboard-date-info" id="dashboardDateInfo"></div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Tasks</div>
          <div class="stat-value" id="totalTasks">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value secondary" id="completedTasks">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Progress</div>
          <div class="stat-value" id="completionPercent">0%</div>
        </div>
      </div>

      <div class="task-section">
        <div class="section-title">Add Task</div>
        <div class="input-group">
          <input type="text" id="taskInput" placeholder="What needs to be done today?" />
          <button onclick="addTask()">Add</button>
        </div>
      </div>

      <div class="task-section">
        <div class="section-title">Tasks</div>
        <div class="checklist" id="checklist"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
          <p>✨ No tasks yet. Add one to get started!</p>
        </div>
      </div>

      <div class="task-section">
        <div class="section-title">Progress</div>
        <div class="chart-container">
          <canvas id="progressChart" role="img" aria-label="Task completion progress chart"></canvas>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR - CALENDAR -->
    <div class="calendar-panel" id="calendarPanel">
      <div class="calendar-header">
        <div class="month-year" id="monthYear">March 2026</div>
      </div>

      <div class="calendar-wrapper">
        <div class="calendar-content" id="calendarContent">
          <!-- Calendar months will be inserted here -->
        </div>
      </div>

      <div class="swipe-hint">👆 Slide to navigate • ⌨️ Use arrow keys</div>
    </div>
  </div>

  <script>
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let selectedDate = new Date();
    let allTasks = JSON.parse(localStorage.getItem('allTasks')) || {};
    let progressChart = null;

    // Swipe detection variables
    let touchStartX = 0;
    let touchStartY = 0;
    let touchCurrentX = 0;
    let isMouseDown = false;
    let isDragging = false;
    let touchPoints = 0;
    const SWIPE_THRESHOLD = 20; // Very low threshold for easy navigation
    const SWIPE_MIN_DISTANCE = 5; // Minimum distance to be considered a swipe

    function initializeDate() {
      selectedDate = new Date();
      renderCalendar();
      updateDashboard();
      setupSwipeListeners();
    }

    function getMonthDays(month, year) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getFirstDayOfMonth(month, year) {
      return new Date(year, month, 1).getDay();
    }

    function renderCalendar() {
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                         'July', 'August', 'September', 'October', 'November', 'December'];
      
      document.getElementById('monthYear').textContent = `${monthNames[currentMonth]} ${currentYear}`;

      const content = document.getElementById('calendarContent');
      content.innerHTML = '';

      // Create calendar month view
      const monthDiv = createMonthView(currentMonth, currentYear);
      content.appendChild(monthDiv);
    }

    function createMonthView(month, year) {
      const monthDiv = document.createElement('div');
      monthDiv.className = 'calendar-month';

      const weekdaysDiv = document.createElement('div');
      weekdaysDiv.className = 'weekdays';
      
      const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      weekdays.forEach(day => {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'weekday';
        dayDiv.textContent = day;
        weekdaysDiv.appendChild(dayDiv);
      });

      const gridDiv = document.createElement('div');
      gridDiv.className = 'calendar-grid';

      const firstDay = getFirstDayOfMonth(month, year);
      const daysInMonth = getMonthDays(month, year);
      const daysInPrevMonth = getMonthDays(month - 1, year);

      // Previous month days
      for (let i = firstDay - 1; i >= 0; i--) {
        const day = daysInPrevMonth - i;
        const cell = createDayCell(day, true, month, year);
        gridDiv.appendChild(cell);
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const cell = createDayCell(day, false, month, year);
        gridDiv.appendChild(cell);
      }

      // Next month days
      const totalCells = gridDiv.children.length;
      const remainingCells = 42 - totalCells;
      for (let day = 1; day <= remainingCells; day++) {
        const cell = createDayCell(day, true, month, year);
        gridDiv.appendChild(cell);
      }

      monthDiv.appendChild(weekdaysDiv);
      monthDiv.appendChild(gridDiv);

      return monthDiv;
    }

    function createDayCell(day, isOtherMonth, month, year) {
      const cell = document.createElement('div');
      cell.className = 'calendar-day';

      if (isOtherMonth) {
        cell.classList.add('other-month');
        cell.innerHTML = `<div class="day-number">${day}</div>`;
      } else {
        const dateKey = formatDateKey(new Date(year, month, day));
        const tasks = allTasks[dateKey] || [];
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

        const dayNumber = document.createElement('div');
        dayNumber.className = 'day-number';
        dayNumber.textContent = day;

        const progressRing = createProgressRing(percent);

        cell.appendChild(dayNumber);
        cell.appendChild(progressRing);

        const today = new Date();
        if (day === today.getDate() && 
            month === today.getMonth() && 
            year === today.getFullYear()) {
          cell.style.borderColor = 'var(--primary)';
        }

        if (day === selectedDate.getDate() && 
            month === selectedDate.getMonth() && 
            year === selectedDate.getFullYear()) {
          cell.classList.add('selected');
        }

        cell.onclick = () => selectDate(new Date(year, month, day));
      }

      return cell;
    }

    function createProgressRing(percent) {
      const container = document.createElement('div');
      container.className = 'progress-ring-small';

      const radius = 12;
      const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (percent / 100) * circumference;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 32 32');

      const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      bgCircle.setAttribute('class', 'progress-circle-bg');
      bgCircle.setAttribute('cx', '16');
      bgCircle.setAttribute('cy', '16');
      bgCircle.setAttribute('r', radius);

      const fillCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      fillCircle.setAttribute('class', 'progress-circle-fill');
      fillCircle.setAttribute('cx', '16');
      fillCircle.setAttribute('cy', '16');
      fillCircle.setAttribute('r', radius);
      fillCircle.setAttribute('stroke-dasharray', circumference);
      fillCircle.setAttribute('stroke-dashoffset', strokeDashoffset);

      svg.appendChild(bgCircle);
      svg.appendChild(fillCircle);

      const percentText = document.createElement('div');
      percentText.className = 'progress-percent';
      percentText.textContent = percent + '%';

      container.appendChild(svg);
      container.appendChild(percentText);

      return container;
    }

    function selectDate(date) {
      selectedDate = new Date(date);
      renderCalendar();
      updateDashboard();
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function updateDashboard() {
      const dateKey = formatDateKey(selectedDate);
      const tasks = allTasks[dateKey] || [];

      // Update header
      const options = { weekday: 'long', month: 'long', day: 'numeric' };
      const dateStr = selectedDate.toLocaleDateString('en-US', options);
      document.getElementById('dashboardDate').textContent = dateStr;
      document.getElementById('dashboardDateInfo').textContent = 
        `Tasks for ${dateStr.split(' ').slice(0, -1).join(' ')}`;

      // Update stats
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

      document.getElementById('totalTasks').textContent = total;
      document.getElementById('completedTasks').textContent = completed;
      document.getElementById('completionPercent').textContent = percent + '%';

      // Update checklist
      const checklist = document.getElementById('checklist');
      const emptyState = document.getElementById('emptyState');

      if (total === 0) {
        checklist.innerHTML = '';
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        checklist.innerHTML = tasks.map(task => `
          <div class="task-item ${task.completed ? 'completed' : ''}">
            <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                   onchange="toggleTask('${dateKey}', ${task.id})">
            <label class="task-label">${escapeHtml(task.text)}</label>
            <button class="delete-btn" onclick="deleteTask('${dateKey}', ${task.id})">✕</button>
          </div>
        `).join('');
      }

      updateChart(percent, completed, total);
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim();
      
      if (taskText) {
        const dateKey = formatDateKey(selectedDate);
        
        if (!allTasks[dateKey]) {
          allTasks[dateKey] = [];
        }

        allTasks[dateKey].push({
          id: Date.now(),
          text: taskText,
          completed: false
        });

        localStorage.setItem('allTasks', JSON.stringify(allTasks));
        input.value = '';
        input.focus();

        updateDashboard();
        renderCalendar();
      }
    }

    function toggleTask(dateKey, taskId) {
      const task = allTasks[dateKey].find(t => t.id === taskId);
      if (task) {
        task.completed = !task.completed;
        localStorage.setItem('allTasks', JSON.stringify(allTasks));
        updateDashboard();
        renderCalendar();
      }
    }

    function deleteTask(dateKey, taskId) {
      allTasks[dateKey] = allTasks[dateKey].filter(t => t.id !== taskId);
      if (allTasks[dateKey].length === 0) {
        delete allTasks[dateKey];
      }
      localStorage.setItem('allTasks', JSON.stringify(allTasks));
      updateDashboard();
      renderCalendar();
    }

    function updateChart(percent, completed, total) {
      const ctx = document.getElementById('progressChart').getContext('2d');
      const incomplete = 100 - percent;

      if (progressChart) {
        progressChart.destroy();
      }

      progressChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: [`Completed (${percent}%)`, 'Remaining'],
          datasets: [{
            data: [percent, incomplete],
            backgroundColor: ['#1baf7a', '#333333'],
            borderColor: ['#1baf7a', '#333333'],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.label + ': ' + context.parsed + '%';
                }
              }
            }
          }
        }
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Enhanced Swipe and drag functionality
    function setupSwipeListeners() {
      const calendarPanel = document.getElementById('calendarPanel');
      const calendarContent = document.getElementById('calendarContent');

      // TOUCH EVENTS
      calendarPanel.addEventListener('touchstart', (e) => {
        touchPoints = e.touches.length;
        
        // Only respond to 2-finger swipe on mobile
        if (touchPoints === 2) {
          touchStartX = (e.touches[0].screenX + e.touches[1].screenX) / 2;
          touchStartY = (e.touches[0].screenY + e.touches[1].screenY) / 2;
          calendarContent.classList.add('dragging');
          e.preventDefault();
        }
      }, { passive: false });

      calendarPanel.addEventListener('touchmove', (e) => {
        if (touchPoints !== 2) return;
        
        touchCurrentX = (e.touches[0].screenX + e.touches[1].screenX) / 2;
        const diff = touchCurrentX - touchStartX;
        
        // Check if it's mostly horizontal movement
        const currentY = (e.touches[0].screenY + e.touches[1].screenY) / 2;
        const verticalDiff = Math.abs(currentY - touchStartY);
        const horizontalDiff = Math.abs(diff);
        
        if (horizontalDiff > verticalDiff) {
          calendarContent.style.transform = `translateX(${diff}px)`;
          e.preventDefault();
        }
      }, { passive: false });

      calendarPanel.addEventListener('touchend', (e) => {
        if (touchPoints !== 2) {
          touchPoints = 0;
          return;
        }
        
        const diff = touchCurrentX - touchStartX;
        calendarContent.classList.remove('dragging');
        touchPoints = 0;

        // Very low threshold - even small swipes trigger navigation
        if (Math.abs(diff) > SWIPE_THRESHOLD) {
          if (diff > 0) {
            previousMonth();
          } else {
            nextMonth();
          }
        } else {
          // Snap back if swipe wasn't enough
          calendarContent.style.transform = 'translateX(0)';
        }
      }, { passive: false });

      // MOUSE EVENTS for Desktop
      calendarPanel.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        touchStartX = e.clientX;
        touchStartY = e.clientY;
        calendarContent.classList.add('dragging');
      });

      calendarPanel.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        
        touchCurrentX = e.clientX;
        const diff = e.clientX - touchStartX;
        const verticalDiff = Math.abs(e.clientY - touchStartY);
        const horizontalDiff = Math.abs(diff);
        
        // Only drag if horizontal movement is dominant
        if (horizontalDiff > verticalDiff) {
          isDragging = true;
          calendarContent.style.transform = `translateX(${diff}px)`;
        }
      });

      calendarPanel.addEventListener('mouseup', (e) => {
        if (!isMouseDown) return;
        
        isMouseDown = false;
        const diff = e.clientX - touchStartX;
        calendarContent.classList.remove('dragging');

        // Low threshold for easy navigation
        if (Math.abs(diff) > SWIPE_THRESHOLD && isDragging) {
          if (diff > 0) {
            previousMonth();
          } else {
            nextMonth();
          }
        } else {
          calendarContent.style.transform = 'translateX(0)';
        }
        
        isDragging = false;
      });

      calendarPanel.addEventListener('mouseleave', () => {
        if (isMouseDown) {
          isMouseDown = false;
          calendarContent.classList.remove('dragging');
          calendarContent.style.transform = 'translateX(0)';
          isDragging = false;
        }
      });
    }

    function previousMonth() {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    }

    document.getElementById('taskInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addTask();
      }
    });

    // Keyboard navigation for calendar months
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        nextMonth();
        e.preventDefault();
      } else if (e.key === 'ArrowLeft') {
        previousMonth();
        e.preventDefault();
      }
    });

    initializeDate();
  </script>
</body>
